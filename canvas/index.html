<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas</title>
    <!-- Inter with all weights used by the layout engine (400–700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }

      /* ── Suppress tldraw built-in UI zones not covered by component:null overrides ── */
      /* Menu zone — hamburger button that bleeds through behind the left toolbar */
      .tlui-menu-zone { display: none !important; }
      /* Navigation zone — zoom controls at bottom-left (belt-and-suspenders with NavigationPanel:null) */
      .tlui-navigation-zone { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
